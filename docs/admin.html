<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var base = '/';
      if (location.hostname.endsWith('github.io')) {
        var seg = location.pathname.split('/').filter(Boolean)[0];
        if (seg) base = '/' + seg + '/';
      }
      window.__BASE__ = base;
      if (base !== '/') {
        var el = document.createElement('base');
        el.href = base;
        document.head.appendChild(el);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1A1814" />
  <title>商家订单管理 · 品鉴江南</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="adminApp" class="admin-app">
    <header class="header">
      <div class="header-brand header-brand-center">
        <h1 class="header-title"><span class="title-main">商家订单</span></h1>
      </div>
      <button class="header-btn" id="refreshBtn" hidden>刷新</button>
    </header>

    <main class="admin-main" id="adminMain">
      <section class="admin-login" id="adminLogin">
        <h2>商家登录</h2>
        <p>请输入管理密钥查看和处理订单</p>
        <div class="password-field">
          <input type="password" id="adminKeyInput" placeholder="管理密钥" autocomplete="off" />
          <button type="button" class="password-toggle" id="toggleAdminKey" aria-label="显示密码">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <p class="login-error" id="loginError" hidden></p>
        <button class="submit-btn" id="adminLoginBtn">进入管理</button>
      </section>

      <section class="admin-list" id="adminList" hidden>
        <div class="admin-toolbar">
          <div class="order-search">
            <input type="text" id="orderSearchInput" placeholder="输入订单号查询" />
            <button type="button" class="search-btn" id="orderSearchBtn">查询</button>
          </div>
          <div class="admin-filters" id="adminFilters">
            <div class="admin-filter-row">
              <button type="button" class="filter-tab" data-filter="pending">待付款 <em id="countPending">0</em></button>
              <button type="button" class="filter-tab" data-filter="paid">待发货 <em id="countPaid">0</em></button>
              <button type="button" class="filter-tab" data-filter="shipped">已发货 <em id="countShipped">0</em></button>
            </div>
            <div class="admin-filter-row admin-filter-row-secondary">
              <button type="button" class="filter-tab active" data-filter="all">全部 <em id="countAll">0</em></button>
              <button type="button" class="filter-tab" data-filter="completed">已完成 <em id="countCompleted">0</em></button>
            </div>
          </div>
        </div>
        <div id="adminOrders"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="actionModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="actionModalTitle">操作订单</h2>
        <button class="close-btn" id="closeActionModal">&times;</button>
      </div>
      <div class="action-modal-body" id="actionModalBody"></div>
    </div>
  </div>

  <div class="modal" id="imagePreviewModal">
    <div class="modal-content qr-preview-content">
      <div class="modal-header">
        <h2 id="imagePreviewTitle">付款截图</h2>
        <button class="close-btn" id="closeImagePreview">&times;</button>
      </div>
      <div class="qr-preview-body">
        <img id="imagePreviewImg" alt="付款截图大图" />
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="order-api.js"></script>
  <script src="admin.js"></script>
</body>
</html>
