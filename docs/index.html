<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var base = '/';
      if (location.hostname.endsWith('github.io')) {
        var seg = location.pathname.split('/').filter(Boolean)[0];
        if (seg) base = '/' + seg + '/';
      }
      window.__BASE__ = base;
      if (base !== '/') {
        var el = document.createElement('base');
        el.href = base;
        document.head.appendChild(el);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1A1814" />
  <title>品鉴江南｜江大伴手礼</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- 顶部 -->
    <header class="header">
      <button class="header-btn" id="backBtn" hidden aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="header-brand">
        <h1 class="header-title">
          <span class="title-main">品鉴江南</span><span class="title-divider">｜</span><span class="title-sub">江大伴手礼</span>
        </h1>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="ordersBtn" aria-label="我的订单">订单</button>
        <button class="cart-btn" id="cartBtn" aria-label="购物袋">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
      </div>
    </header>

    <!-- 主体：左分类 + 右商品 -->
    <main class="main">
      <nav class="category-nav" id="categoryNav"></nav>
      <section class="product-area" id="productArea"></section>
    </main>

    <!-- 购物车抽屉 -->
    <div class="overlay" id="overlay"></div>
    <aside class="cart-drawer" id="cartDrawer">
      <div class="drawer-header">
        <h2>购物袋</h2>
        <button class="close-btn" id="closeCart">&times;</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>合计</span>
          <strong id="cartTotal">¥0</strong>
        </div>
        <button class="checkout-btn" id="checkoutBtn">确认结算</button>
      </div>
    </aside>

    <!-- 加入购物袋弹窗 -->
    <div class="modal" id="addCartModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="addCartTitle">加入购物袋</h2>
          <button class="close-btn" id="closeAddCart">&times;</button>
        </div>
        <div class="add-cart-body" id="addCartBody"></div>
      </div>
    </div>

    <!-- 结算弹窗 -->
    <div class="modal" id="checkoutModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>填写订购信息</h2>
          <button class="close-btn" id="closeCheckout">&times;</button>
        </div>
        <form id="orderForm" class="order-form">
          <label>
            <span>姓名</span>
            <input type="text" name="name" required placeholder="请输入您的姓名" />
          </label>
          <label>
            <span>手机号</span>
            <input type="tel" name="phone" required pattern="^1[3-9]\d{9}$" placeholder="11位手机号码" />
          </label>
          <div class="address-section">
            <div class="address-section-head">
              <span>收货地址</span>
              <button type="button" class="text-btn" id="parseAddressBtn">识别粘贴地址</button>
            </div>
            <textarea id="addressPaste" rows="2" placeholder="可粘贴完整地址，如：江苏省无锡市滨湖区江南大学蠡湖校区…"></textarea>
            <div class="address-grid">
              <label class="address-select">
                <span>省份</span>
                <select name="province" required></select>
              </label>
              <label class="address-select">
                <span>城市</span>
                <select name="city" required disabled></select>
              </label>
              <label class="address-select">
                <span>区县</span>
                <select name="district" required disabled></select>
              </label>
            </div>
            <label>
              <span>详细地址</span>
              <input type="text" name="detail" required placeholder="街道、小区、门牌号等" />
            </label>
          </div>
          <label>
            <span>备注（选填）</span>
            <input type="text" name="note" placeholder="配送时间、礼品包装等" />
          </label>
          <div class="order-summary" id="orderSummary"></div>
          <button type="submit" class="submit-btn">确认订购</button>
        </form>
      </div>
    </div>

    <!-- 下单成功 / 付款引导 -->
    <div class="modal" id="paymentModal">
      <div class="modal-content payment-content">
        <div class="modal-header">
          <h2>请完成付款</h2>
          <button class="close-btn" id="closePayment">&times;</button>
        </div>
        <div class="payment-body">
          <p class="payment-intro">
            订单
            <span class="payment-order-id">
              <strong id="paymentOrderId"></strong>
              <button type="button" class="copy-order-btn" id="copyOrderIdBtn" aria-label="复制订单号">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
            </span>
            已提交，请按以下步骤完成付款：
          </p>
          <p class="payment-amount">应付金额：<strong id="paymentAmount">¥0</strong></p>
          <ol class="payment-steps">
            <li>扫描下方支付宝或微信收款码完成转账</li>
            <li>转账备注请填写订单号</li>
            <li>上传付款截图，商家核对后将安排发货</li>
          </ol>
          <div class="payment-qr-grid">
            <div class="payment-qr-item">
              <span>支付宝</span>
              <button type="button" class="payment-qr-btn" id="payQrAlipayBtn" aria-label="放大查看支付宝收款码">
                <img id="payQrAlipay" alt="支付宝收款码" />
              </button>
            </div>
            <div class="payment-qr-item">
              <span>微信</span>
              <button type="button" class="payment-qr-btn" id="payQrWechatBtn" aria-label="放大查看微信收款码">
                <img id="payQrWechat" alt="微信收款码" />
              </button>
            </div>
          </div>
          <p class="payment-qr-hint">点击收款码可放大查看，长按或保存到相册</p>
          <div class="payment-upload">
            <span class="upload-label-text">上传付款截图</span>
            <label class="upload-box" id="paymentUploadLabel">
              <input type="file" id="paymentProofInput" accept="image/*" />
              <span id="paymentPreviewHint">点击从相册选择截图</span>
              <img id="paymentPreviewImg" hidden alt="付款截图预览" />
            </label>
            <button type="button" class="submit-btn" id="submitPaymentBtn">提交付款截图</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal" id="qrPreviewModal">
      <div class="modal-content qr-preview-content">
        <div class="modal-header">
          <h2 id="qrPreviewTitle">收款码</h2>
          <button class="close-btn" id="closeQrPreview">&times;</button>
        </div>
        <div class="qr-preview-body">
          <img id="qrPreviewImg" alt="收款码大图" />
          <p class="qr-preview-hint">长按图片可保存到相册</p>
          <button type="button" class="submit-btn" id="saveQrBtn">保存到相册</button>
        </div>
      </div>
    </div>

    <div class="modal" id="successModal">
      <div class="modal-content success-content">
        <div class="success-icon">✓</div>
        <h2 id="successTitle">提交成功</h2>
        <p id="successMsg">我们已收到您的信息。</p>
        <button class="submit-btn" id="successOk">好的</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="regions.js"></script>
  <script src="data.js"></script>
  <script src="address.js"></script>
  <script src="order-api.js"></script>
  <script src="app.js"></script>
</body>
</html>
